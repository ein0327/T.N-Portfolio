<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrial Dashboard | T.N Portfolio Demo</title>
  <meta name="description" content="T.Nポートフォリオ - Reactを用いた業務システム・ダッシュボードの非同期データ取得と状態管理のデモです。">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* =======================================================
       Industrial / Corporate Trust Tokens
       ======================================================= */
    :root {
      --bg-body: #f1f5f9;
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      
      --color-primary: #2563eb; /* Corporate Blue */
      --color-primary-hover: #1d4ed8;
      --color-border: #e2e8f0;
      
      --status-success: #10b981;
      --status-warning: #f59e0b;
      --status-error: #ef4444;

      --font-main: 'Inter', sans-serif;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: var(--font-main);
      font-size: 14px; /* Standard dense UI size */
      line-height: 1.5;
    }

    /* Layout */
    .dashboard-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background-color: #1e293b;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid #334155;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
    }
    .nav-item {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #cbd5e1;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
    }
    .nav-item:hover, .nav-item.active {
      background-color: #334155;
      color: #fff;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-header {
      height: 64px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    .page-content {
      padding: 2rem;
      overflow-y: auto;
      flex: 1;
    }

    /* Typography */
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-muted); }

    /* Cards & Grids */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .kpi-title {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .kpi-value {
      font-size: 2rem;
      font-weight: 700;
    }
    .kpi-trend {
      font-size: 0.875rem;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* Controls & Forms */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .search-input {
      padding: 0.5rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      width: 300px;
      font-family: inherit;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* Data Table */
    .table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }
    th {
      background-color: #f8fafc;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    tbody tr:hover { background-color: #f8fafc; }
    
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-Active { background: #dcfce7; color: #166534; }
    .status-Pending { background: #fef3c7; color: #92400e; }
    .status-Error { background: #fee2e2; color: #991b1b; }

    /* Skeleton Loading Animation */
    .skeleton {
      background: #e2e8f0;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .skeleton::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .demo-return {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--color-primary);
      color: #fff;
      padding: 10px 20px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      box-shadow: var(--shadow-md);
      z-index: 1000;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <a href="index.html#works" class="demo-return">← Return to Portfolio</a>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Dummy API Data
    const mockData = [
      { id: 'SYS-1029', node: 'Factory Alpha - Line 1', uptime: '99.9%', latency: '24ms', status: 'Active' },
      { id: 'SYS-1030', node: 'Warehouse Beta - Core', uptime: '98.2%', latency: '45ms', status: 'Active' },
      { id: 'SYS-1031', node: 'Logistics API Gateway', uptime: '95.0%', latency: '120ms', status: 'Pending' },
      { id: 'SYS-1032', node: 'Factory Gamma - Line 3', uptime: '82.4%', latency: '500ms', status: 'Error' },
      { id: 'SYS-1033', node: 'Data Lake Ingestion', uptime: '99.9%', latency: '12ms', status: 'Active' }
    ];

    const Dashboard = () => {
      // States to simulate Next.js data fetching
      const [data, setData] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');

      // Simulate network request
      useEffect(() => {
        const timer = setTimeout(() => {
          setData(mockData);
          setIsLoading(false);
        }, 1500); // 1.5s simulated loading
        return () => clearTimeout(timer);
      }, []);

      // Filter logic using useMemo for performance
      const filteredData = useMemo(() => {
        return data.filter(item => 
          item.node.toLowerCase().includes(searchQuery.toLowerCase()) || 
          item.id.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }, [data, searchQuery]);

      return (
        <div className="dashboard-layout">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="sidebar-header">
              INDUSTRIAL<span style={{ color: 'var(--color-primary)' }}>OS</span>
            </div>
            <nav style={{ marginTop: '1rem' }}>
              <div className="nav-item active">📊 System Overview</div>
              <div className="nav-item">⚙️ Device Management</div>
              <div className="nav-item">⚠️ Alerts & Events</div>
              <div className="nav-item">📈 Reporting</div>
            </nav>
            <div style={{ marginTop: 'auto', padding: '1.5rem', fontSize: '0.8rem', color: '#64748b' }}>
              v2.4.1 Production
            </div>
          </aside>

          {/* Main Content */}
          <main className="main-content">
            <header className="top-header">
              <div style={{ fontWeight: 600, color: 'var(--text-muted)' }}>System / Overview</div>
              <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                <span style={{ background: '#e2e8f0', padding: '4px 8px', borderRadius: '4px', fontSize: '0.75rem', fontWeight: 600 }}>REACT JS DEMO</span>
                <div style={{ width: '32px', height: '32px', background: 'var(--color-primary)', borderRadius: '50%', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold' }}>A</div>
              </div>
            </header>

            <div className="page-content">
              <h1>System Overview</h1>

              {/* KPIs */}
              <div className="kpi-grid">
                <div className="card">
                  <div className="kpi-title">Global Network Uptime</div>
                  {isLoading ? <div className="skeleton" style={{ height: '38px', width: '60%' }}></div> : 
                    <div className="kpi-value">99.82%</div>}
                  <div className="kpi-trend" style={{ color: 'var(--status-success)' }}>↑ 0.04% from last week</div>
                </div>
                <div className="card">
                  <div className="kpi-title">Active Nodes</div>
                  {isLoading ? <div className="skeleton" style={{ height: '38px', width: '40%' }}></div> : 
                    <div className="kpi-value">1,204</div>}
                  <div className="kpi-trend" style={{ color: 'var(--text-muted)' }}>All systems operational</div>
                </div>
                <div className="card">
                  <div className="kpi-title">Critical Alerts</div>
                  {isLoading ? <div className="skeleton" style={{ height: '38px', width: '30%' }}></div> : 
                    <div className="kpi-value" style={{ color: 'var(--status-error)' }}>3</div>}
                  <div className="kpi-trend" style={{ color: 'var(--status-error)' }}>Requires immediate action</div>
                </div>
              </div>

              <h2>Active Instances</h2>
              
              <div className="controls-bar">
                <input 
                  type="text" 
                  className="search-input" 
                  placeholder="Search by Node Name or ID..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  disabled={isLoading}
                />
              </div>

              {/* Data Table */}
              <div className="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Instance ID</th>
                      <th>Node Name</th>
                      <th>Uptime</th>
                      <th>Latency</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {isLoading ? (
                      // Skeleton Rows
                      Array.from({ length: 4 }).map((_, i) => (
                        <tr key={i}>
                          <td><div className="skeleton" style={{ height: '20px', width: '80px' }}></div></td>
                          <td><div className="skeleton" style={{ height: '20px', width: '150px' }}></div></td>
                          <td><div className="skeleton" style={{ height: '20px', width: '50px' }}></div></td>
                          <td><div className="skeleton" style={{ height: '20px', width: '50px' }}></div></td>
                          <td><div className="skeleton" style={{ height: '24px', width: '60px', borderRadius: '99px' }}></div></td>
                        </tr>
                      ))
                    ) : filteredData.length > 0 ? (
                      filteredData.map(row => (
                        <tr key={row.id}>
                          <td style={{ fontFamily: 'monospace', color: 'var(--text-muted)' }}>{row.id}</td>
                          <td style={{ fontWeight: 500 }}>{row.node}</td>
                          <td>{row.uptime}</td>
                          <td>{row.latency}</td>
                          <td><span className={`status-badge status-${row.status}`}>{row.status}</span></td>
                        </tr>
                      ))
                    ) : (
                      <tr>
                        <td colSpan="5" style={{ textAlign: 'center', padding: '3rem', color: 'var(--text-muted)' }}>
                          No instances found matching "{searchQuery}"
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>

            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
