<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Magenta -->
    </linearGradient>
  </defs>
  
  <!-- Dark minimal rounded background -->
  <rect width="512" height="512" rx="120" fill="#0f111a" />
  
  <!-- Centered emblem representing Design (Sphere) + Code (Diamond Brackets) -->
  <g transform="translate(256, 256)">
    <!-- Outer Sphere -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="url(#faviconGrad)" stroke-width="32" opacity="0.9" />
    
    <!-- Inner Code diamond <> -->
    <path d="M 0 -95 L 95 0 L 0 95 L -95 0 Z" fill="none" stroke="url(#faviconGrad)" stroke-width="36" stroke-linejoin="round" />
    
    <!-- Core Engine -->
    <circle cx="0" cy="0" r="40" fill="url(#faviconGrad)" />
  </g>
</svg>
