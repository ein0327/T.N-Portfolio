<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphism UI | T.N Portfolio Demo</title>
  <meta name="description" content="T.Nポートフォリオ - 複雑なbox-shadowの計算を用いたニューモーフィズムデザインの実装デモです。">
  
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* =======================================================
       Neumorphism System Tokens (CSS Variables Simulation)
       ======================================================= */
    :root {
      /* Base Color: A specific grey-blue that works well with shadows */
      --bg-base: #e0e5ec;
      
      /* Shadow Colors derived from Base */
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      
      /* Accents & Text */
      --text-main: #4d5b6b;
      --text-muted: #8a97a8;
      --accent-color: #6c5ce7;
      
      --font-main: 'Nunito', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* -------------------------------------------
       Neumorphic Mixins (Simulated)
       ------------------------------------------- */
    
    /* 1. Flat/Convex Surface (Pops out) */
    .neu-surface {
      background: var(--bg-base);
      box-shadow: 
        9px 9px 16px var(--shadow-dark), 
        -9px -9px 16px var(--shadow-light);
      border-radius: 20px;
    }

    /* 2. Concave Surface (Pressed in - Inputs, Tracks) */
    .neu-pressed {
      background: var(--bg-base);
      box-shadow: 
        inset 6px 6px 10px 0 var(--shadow-dark), 
        inset -6px -6px 10px 0 var(--shadow-light);
      border-radius: 20px;
    }

    /* 3. Interactive Element (Buttons) */
    .neu-btn {
      background: var(--bg-base);
      box-shadow: 
        7px 7px 15px var(--shadow-dark), 
        -7px -7px 15px var(--shadow-light);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
      color: var(--text-main);
      outline: none;
    }
    .neu-btn:hover {
      color: var(--accent-color);
    }
    .neu-btn:active, .neu-btn.active {
      box-shadow: 
        inset 4px 4px 10px var(--shadow-dark), 
        inset -4px -4px 10px var(--shadow-light);
      color: var(--accent-color);
    }

    /* -------------------------------------------
       App Layout: Music Player Interface
       ------------------------------------------- */
    .player-app {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Top Bar */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .top-bar .neu-btn {
      width: 45px; height: 45px;
      border-radius: 12px; /* Override to rounded rect */
    }

    /* Cover Art */
    .cover-art-container {
      width: 220px; height: 220px;
      border-radius: 50%;
      padding: 10px;
    }
    .cover-art {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .cover-art::after {
      content: '';
      width: 50px; height: 50px;
      background: var(--bg-base);
      border-radius: 50%;
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
    }

    /* Track Info */
    .track-info {
      text-align: center;
    }
    .track-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }
    .track-artist {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Progress Slider */
    .progress-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .progress-bar-bg {
      width: 100%;
      height: 8px;
      border-radius: 10px;
    }
    .progress-bar-fill {
      width: 45%;
      height: 100%;
      background: var(--accent-color);
      border-radius: 10px;
      box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
    }
    .time-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 1rem;
    }
    .btn-small { width: 50px; height: 50px; }
    .btn-large { 
      width: 70px; height: 70px; 
      background: var(--accent-color);
      color: #fff;
      box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
    }
    .btn-large:active, .btn-large.active {
      box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2), inset -4px -4px 8px rgba(255,255,255,0.2);
    }

    /* SVG Icons styling */
    svg {
      width: 20px; height: 20px;
      fill: currentColor;
    }
    .btn-large svg { fill: #fff; width: 24px; height: 24px; }

    /* Info Overlay */
    .info-overlay {
      position: absolute;
      bottom: 2rem;
      max-width: 400px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Reveal Animation */
    .reveal {
      opacity: 0;
      transform: scale(0.95);
      animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* Fixed Return Btn */
    .demo-return {
      position: fixed;
      top: 20px;
      left: 20px;
      color: var(--text-muted);
      font-weight: 700;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 12px;
      transition: all 0.2s;
    }
  </style>
</head>
<body>

  <a href="index.html#works" class="demo-return neu-btn">← Back</a>

  <!-- Music Player UI -->
  <div class="player-app neu-surface reveal">
    
    <div class="top-bar">
      <button class="neu-btn">
        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
      </button>
      <span style="font-weight:700; font-size:0.9rem; color:var(--text-muted);">PLAYING NOW</span>
      <button class="neu-btn">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
    </div>

    <div class="cover-art-container neu-surface">
      <div class="cover-art"></div>
    </div>

    <div class="track-info">
      <div class="track-title">Neumorphic Waves</div>
      <div class="track-artist">T.N Design Lab</div>
    </div>

    <div class="progress-wrapper">
      <div class="time-labels">
        <span>1:42</span>
        <span>3:14</span>
      </div>
      <div class="progress-bar-bg neu-pressed">
        <div class="progress-bar-fill"></div>
      </div>
    </div>

    <div class="controls">
      <button class="neu-btn btn-small">
        <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
      </button>
      
      <button class="neu-btn btn-large" id="play-pause" onclick="this.classList.toggle('active')">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <button class="neu-btn btn-small">
        <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
      </button>
    </div>

  </div>

  <div class="info-overlay">
    This Neumorphism demo relies entirely on multiple precisely calculated <code>box-shadow</code> layers (standard and inset) combined with a specific background hex color to simulate 3D extrusion.
  </div>

</body>
</html>
