<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism FinTech | T.N Portfolio Demo</title>
  <meta name="description" content="T.Nポートフォリオ - backdrop-filterを用いたグラスモーフィズムデザインの実装デモです。レイヤー管理とz-indexの正確な制御を証明します。">
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    /* =======================================================
       Glassmorphism Tokens & Utilities
       ======================================================= */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-highlight: rgba(255, 255, 255, 0.3);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      
      --color-primary: #8b5cf6;
      --color-secondary: #ec4899;
      --color-tertiary: #3b82f6;

      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b0f19;
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* -------------------------------------------
       Pure CSS Animated Background Orbs
       ------------------------------------------- */
    .bg-orbs {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
      background: linear-gradient(125deg, #0b0f19 0%, #1a1025 100%);
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: float 20s infinite ease-in-out alternate;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: var(--color-primary);
      top: -10%; left: -10%;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: var(--color-secondary);
      bottom: -20%; right: -10%;
      animation-delay: -5s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: var(--color-tertiary);
      top: 40%; left: 50%;
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* -------------------------------------------
       Glassmorphism Core Class
       ------------------------------------------- */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight); /* Light source from top */
      border-left: 1px solid var(--glass-highlight);
      box-shadow: var(--glass-shadow);
      border-radius: 24px;
    }

    /* -------------------------------------------
       Layout
       ------------------------------------------- */
    .app-container {
      display: flex;
      max-width: 1400px;
      margin: 2rem auto;
      gap: 2rem;
      padding: 0 2rem;
      min-height: calc(100vh - 4rem);
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .logo {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      border-radius: 8px;
    }
    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .nav-link {
      padding: 1rem;
      border-radius: 12px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.1);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .top-bar {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 20px;
    }

    /* Grid Layout for Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: minmax(180px, auto);
      gap: 2rem;
    }
    .widget {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    /* Grid Spans */
    .widget-large { grid-column: span 2; grid-row: span 2; }
    .widget-tall { grid-row: span 2; }
    
    .widget-title {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .widget-value {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 800;
    }
    .widget-value.large {
      font-size: 4rem;
    }

    /* Graphic Elements inside Glass */
    .glass-chart {
      width: 100%;
      height: 60px;
      margin-top: 1rem;
      background: linear-gradient(90deg, rgba(139, 92, 246, 0) 0%, rgba(139, 92, 246, 0.5) 50%, rgba(139, 92, 246, 0) 100%);
      border-radius: 30px;
      position: relative;
    }
    .glass-chart::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; width: 100%; height: 2px;
      background: var(--color-primary);
      box-shadow: 0 0 10px var(--color-primary);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
      .widget-large { grid-column: span 2; }
    }
    @media (max-width: 768px) {
      .app-container { flex-direction: column; padding: 1rem; margin: 0; min-height: 100vh; }
      .sidebar { width: 100%; border-radius: 20px; padding: 1.5rem; }
      .nav-menu { flex-direction: row; flex-wrap: wrap; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .widget-large { grid-column: span 1; }
    }

    /* Reveal Animation */
    .reveal {
      animation: glassFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }
    @keyframes glassFadeUp {
      0% { opacity: 0; transform: translateY(30px) scale(0.98); backdrop-filter: blur(0px); }
      100% { opacity: 1; transform: translateY(0) scale(1); backdrop-filter: blur(16px); }
    }

    /* Fixed Return Btn */
    .demo-return {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 12px 24px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 30px;
      z-index: 1000;
      transition: all 0.3s;
    }
    .demo-return:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

  <!-- Pure CSS Animated Background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar glass-panel reveal" style="animation-delay: 0.1s;">
      <div class="logo">
        <div class="logo-icon"></div>
        GLASS UI
      </div>
      <nav class="nav-menu">
        <a href="#" class="nav-link active">Dashboard</a>
        <a href="#" class="nav-link">Transactions</a>
        <a href="#" class="nav-link">Analytics</a>
        <a href="#" class="nav-link">Settings</a>
      </nav>
      
      <div style="margin-top: auto;">
        <div class="glass-panel" style="padding: 1.5rem; background: rgba(255,255,255,0.02);">
          <div class="widget-title">Z-Index layering</div>
          <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">
            Notice how the blurred background interacts naturally with the animated orbs behind it.
          </p>
        </div>
      </div>
    </aside>

    <!-- Main View -->
    <main class="main-content">
      
      <!-- Top Bar -->
      <header class="top-bar glass-panel reveal" style="animation-delay: 0.2s;">
        <h1 style="font-family: var(--font-heading); font-size: 1.5rem;">Overview</h1>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <span style="color: var(--color-primary); font-weight: 600;">+ $4,200.50</span>
          <div style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid #fff;"></div>
        </div>
      </header>

      <!-- Grid -->
      <div class="dashboard-grid">
        
        <div class="widget widget-large glass-panel reveal" style="animation-delay: 0.3s;">
          <div>
            <div class="widget-title">Total Balance</div>
            <div class="widget-value large">$124,500.00</div>
          </div>
          <div class="glass-chart" style="height: 120px; border-radius: 12px; margin-top: 2rem;"></div>
        </div>

        <div class="widget glass-panel reveal" style="animation-delay: 0.4s;">
          <div>
            <div class="widget-title">Monthly Income</div>
            <div class="widget-value">$12,400</div>
          </div>
          <div class="glass-chart"></div>
        </div>

        <div class="widget glass-panel reveal" style="animation-delay: 0.5s;">
          <div>
            <div class="widget-title">Monthly Expenses</div>
            <div class="widget-value">$4,230</div>
          </div>
          <div class="glass-chart" style="background: linear-gradient(90deg, rgba(236, 72, 153, 0) 0%, rgba(236, 72, 153, 0.5) 50%, rgba(236, 72, 153, 0) 100%);">
            <style>
              .widget:nth-child(3) .glass-chart::before { background: var(--color-secondary); box-shadow: 0 0 10px var(--color-secondary); }
            </style>
          </div>
        </div>

      </div>

    </main>

  </div>

  <a href="index.html#works" class="demo-return">← Return to Portfolio</a>

</body>
</html>
